name: Cleanup Old Allure Reports

# Runs weekly on Sunday at 02:00 UTC, or on-demand
on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      max_reports:
        description: 'Maximum number of report runs to keep'
        required: false
        default: '40'
        type: string
      max_days:
        description: 'Maximum age in days to keep a report'
        required: false
        default: '30'
        type: string
      dry_run:


permissions:
  contents: write

jobs:
  cleanup:
    name: Prune gh-pages report history
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main branch (for cleanup script)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install ts-node
        run: npm install -g ts-node typescript

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: List current report directories
        run: |
          echo "── Current gh-pages run directories ──"
          ls -1d gh-pages/[0-9]* 2>/dev/null | sort -t/ -k2 -n || echo "(none)"
          echo ""
          TOTAL=$(ls -1d gh-pages/[0-9]* 2>/dev/null | wc -l)
          echo "Total run directories: $TOTAL"

      - name: Run cleanup script
        run: |
          MAX_REPORTS="${{ github.event.inputs.max_reports || '40' }}"
          MAX_DAYS="${{ github.event.inputs.max_days || '30' }}"
          DRY_RUN="${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}"

          npx ts-node .github/scripts/cleanup-reports.ts \
            --dir gh-pages \
            --max-reports "$MAX_REPORTS" \
            --max-days    "$MAX_DAYS"    \
            $DRY_RUN

      - name: Commit and push cleaned gh-pages
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          cd gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit — gh-pages already clean."
          else
            REMOVED=$(git diff --cached --name-only --diff-filter=D | wc -l)
            git commit -m "chore: prune ${REMOVED} old report run(s) (max=${{ github.event.inputs.max_reports || '40' }}, days=${{ github.event.inputs.max_days || '30' }})"
            git push origin gh-pages
            echo "gh-pages cleaned up."
          fi

      - name: Write job summary
        run: |
          echo "## 🧹 Allure Report Cleanup" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Max reports kept | ${{ github.event.inputs.max_reports || '40' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Max age (days)   | ${{ github.event.inputs.max_days    || '30' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry run          | ${{ github.event.inputs.dry_run     || 'false' }} |" >> "$GITHUB_STEP_SUMMARY"
          REMAINING=$(ls -1d gh-pages/[0-9]* 2>/dev/null | wc -l)
          echo "| Runs remaining   | ${REMAINING} |" >> "$GITHUB_STEP_SUMMARY"
