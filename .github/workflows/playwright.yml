name: Playwright Tests with Allure Report

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run nightly at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      browser_engine:
        description: 'Browser engine to test (leave blank for all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit

# Allow the GITHUB_TOKEN to write to gh-pages and read Actions artifacts
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Run tests (3 engines × 3 shards = up to 9 parallel runners)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: ${{ matrix.browser_engine }} – shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        # Each engine installs only its own browser binary.
        #   chromium → Desktop Chrome, Desktop Chrome HiDPI, Desktop Edge,
        #              Pixel 7, Galaxy S9+, Galaxy Tab S4
        #   firefox  → Desktop Firefox, Desktop Firefox HiDPI
        #   webkit   → Desktop Safari, iPhone 15, iPhone 15 Pro Max,
        #              iPhone SE, iPad Pro 11, iPad Mini
        browser_engine: [chromium, firefox, webkit]
        shard: ['1/3', '2/3', '3/3']
        exclude:
          - browser_engine: ${{ github.event.inputs.browser_engine != 'all' && github.event.inputs.browser_engine != 'chromium' && 'chromium' || '' }}
          - browser_engine: ${{ github.event.inputs.browser_engine != 'all' && github.event.inputs.browser_engine != 'firefox'  && 'firefox'  || '' }}
          - browser_engine: ${{ github.event.inputs.browser_engine != 'all' && github.event.inputs.browser_engine != 'webkit'   && 'webkit'   || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (${{ matrix.browser_engine }} only)
        run: npx playwright install --with-deps ${{ matrix.browser_engine }}

      - name: Run Playwright tests
        run: |
          if [ "${{ matrix.browser_engine }}" = "chromium" ]; then
            npx playwright test --project="Desktop Chrome" --project="Desktop Chrome HiDPI" --project="Desktop Edge" --project="Pixel 7" --project="Galaxy S9+" --project="Galaxy Tab S4" --shard=${{ matrix.shard }} --reporter=line,allure-playwright
          elif [ "${{ matrix.browser_engine }}" = "firefox" ]; then
            npx playwright test --project="Desktop Firefox" --project="Desktop Firefox HiDPI" --shard=${{ matrix.shard }} --reporter=line,allure-playwright
          elif [ "${{ matrix.browser_engine }}" = "webkit" ]; then
            npx playwright test --project="Desktop Safari" --project="iPhone 15" --project="iPhone 15 Pro Max" --project="iPhone SE" --project="iPad Pro 11" --project="iPad Mini" --shard=${{ matrix.shard }} --reporter=line,allure-playwright
          fi
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://demo.playwright.dev/todomvc' }}
          CI: true

      - name: Upload Allure results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser_engine }}-${{ strategy.job-index }}
          path: allure-results/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Merge results, generate Allure report, publish to GitHub Pages
  #          Only runs on pushes to main (not on PRs)
  # ────────────────────────────────────────────────────────────────────────────
  publish-report:
    name: Publish Allure Report → GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js (for cleanup script)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install ts-node
        run: npm install -g ts-node typescript

      # ── Download all shard results ──────────────────────────────────────────
      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results-combined/
          merge-multiple: true

      # ── Check out gh-pages so we can read history and mutate it ─────────────
      - name: Checkout gh-pages branch (create if absent)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Initialise gh-pages branch if it does not exist
        run: |
          if [ ! -d gh-pages/.git ]; then
            mkdir -p gh-pages
            cd gh-pages
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git checkout --orphan gh-pages
            touch .nojekyll
            git add .nojekyll
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: initialise gh-pages branch"
            git push origin gh-pages
          fi

      # ── Copy Allure history into raw results so trend graphs work ───────────
      - name: Restore Allure history from gh-pages
        run: |
          mkdir -p allure-results-combined/history
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history/. allure-results-combined/history/
            echo "History restored ($(ls gh-pages/history | wc -l) files)."
          else
            echo "No existing history found — first run."
          fi

      # ── Generate the Allure report ───────────────────────────────────────────
      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline
          allure --version

      - name: Generate Allure report
        run: |
          allure generate allure-results-combined \
            --clean \
            -o allure-report-new

      # ── Run number: use the GitHub run number as the subdirectory name ───────
      - name: Determine run directory name
        id: run_dir
        run: echo "name=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      # ── Assemble the new gh-pages tree ───────────────────────────────────────
      # Layout:
      #   gh-pages/
      #     index.html           ← latest report (always the newest run)
      #     history/             ← Allure trend data carried forward each run
      #     last-history/        ← raw snapshot for next run's history restore
      #     badges/              ← generated SVG status badge
      #     .nojekyll            ← disables Jekyll processing
      #     <run_number>/        ← this run's full self-contained report
      #     <older run dirs>/    ← kept per cleanup policy (≤40 runs, ≤30 days)
      - name: Copy new report into gh-pages tree
        run: |
          RUN_DIR="gh-pages/${{ steps.run_dir.outputs.name }}"
          mkdir -p "$RUN_DIR"
          cp -r allure-report-new/. "$RUN_DIR/"

          # Root index always points to the freshest run
          cp allure-report-new/index.html gh-pages/index.html

          # Carry history forward so trend data accumulates correctly
          mkdir -p gh-pages/history
          cp -r allure-report-new/history/. gh-pages/history/

          # Last-history snapshot (used by badge generators and some plugins)
          mkdir -p gh-pages/last-history
          cp -r allure-report-new/history/. gh-pages/last-history/

          touch gh-pages/.nojekyll

      # ── Generate SVG status badge ────────────────────────────────────────────
      - name: Generate status badge
        run: |
          mkdir -p gh-pages/badges
          SUMMARY="allure-report-new/widgets/summary.json"

          if [ -f "$SUMMARY" ]; then
            PASSED=$(jq '.statistic.passed  // 0' "$SUMMARY")
            FAILED=$(jq '.statistic.failed  // 0' "$SUMMARY")
            BROKEN=$(jq '.statistic.broken  // 0' "$SUMMARY")
            TOTAL=$(jq  '.statistic.total   // 0' "$SUMMARY")

            if [ "$FAILED" -gt 0 ] || [ "$BROKEN" -gt 0 ]; then
              COLOR="e05d44"; STATUS="failing"
            elif [ "$TOTAL" -eq 0 ]; then
              COLOR="9f9f9f"; STATUS="no tests"
            else
              COLOR="4c1";    STATUS="passing"
            fi

            cat > gh-pages/badges/tests.svg << BADGE
          <svg xmlns="http://www.w3.org/2000/svg" width="144" height="20">
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <rect rx="3" width="144" height="20" fill="#555"/>
            <rect rx="3" x="48" width="96" height="20" fill="#${COLOR}"/>
            <rect x="48" width="4"  height="20" fill="#${COLOR}"/>
            <rect rx="3" width="144" height="20" fill="url(#s)"/>
            <g fill="#fff" text-anchor="middle"
               font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
              <text x="25"  y="15" fill="#010101" fill-opacity=".3">tests</text>
              <text x="25"  y="14">tests</text>
              <text x="95" y="15" fill="#010101" fill-opacity=".3">${PASSED}/${TOTAL} ${STATUS}</text>
              <text x="95" y="14">${PASSED}/${TOTAL} ${STATUS}</text>
            </g>
          </svg>
          BADGE
            echo "Badge: ${PASSED}/${TOTAL} ${STATUS}"
          else
            echo "summary.json not found — badge skipped."
          fi

      # ── Clean up old runs: > 40 runs OR older than 30 days ──────────────────
      - name: Clean up old report runs
        run: |
          npx ts-node .github/scripts/cleanup-reports.ts \
            --dir gh-pages \
            --max-reports 40 \
            --max-days 30

      # ── Commit and push all changes back to gh-pages ─────────────────────────
      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "report: run #${{ github.run_number }} · $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin gh-pages
          fi

      # ── Surface the live URL in the job summary ──────────────────────────────
      - name: Write job summary
        run: |
          OWNER=$(echo "${{ github.repository }}" | cut -d/ -f1)
          SLUG=$(echo  "${{ github.repository }}" | cut -d/ -f2)
          BASE="https://${OWNER}.github.io/${SLUG}"
          RUN="${{ steps.run_dir.outputs.name }}"
          echo "## ✅ Allure Report Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | Link |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏠 Latest report | [${BASE}/](${BASE}/) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📋 This run (#${RUN}) | [${BASE}/${RUN}/](${BASE}/${RUN}/) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔰 Badge | \`![tests](${BASE}/badges/tests.svg)\` |" >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — PR-only: generate and upload Allure report as downloadable artifact
  #          (Pages publish is skipped for PRs to avoid polluting history)
  # ────────────────────────────────────────────────────────────────────────────
  pr-report-artifact:
    name: Upload Allure Report (PR only)
    runs-on: ubuntu-latest
    needs: test
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results-combined/
          merge-multiple: true

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure report
        run: allure generate allure-results-combined --clean -o allure-report

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-pr-${{ github.event.pull_request.number }}
          path: allure-report/
          retention-days: 14
